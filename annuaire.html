<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annuaire des Commerçants - Pont-sur-Yonne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- Navigation identique pour la cohérence -->
    <header class="bg-blue-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold tracking-tight text-white no-underline">Pont-sur-Yonne <span class="font-light text-blue-200">Shopping</span></a>
            <a href="index.html" class="text-sm bg-blue-800 px-3 py-1 rounded">← Retour Accueil</a>
        </div>
    </header>

    <main class="container mx-auto max-w-4xl p-6">
        <h1 class="text-3xl font-extrabold mb-2">Annuaire Officiel</h1>
        <p class="text-gray-600 mb-8 font-medium italic">Soutenez vos commerces de Pont-sur-Yonne (89140)</p>

        <!-- Liste des commerçants -->
        <div class="grid gap-6">
            
            <!-- Exemple 1 -->
            <article class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4 hover:border-blue-400 transition-all" itemscope itemtype="https://schema.org/LocalBusiness">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                        <i class="fa-solid fa-store text-xl"></i>
                    </div>
                    <div>
                        <h4 class="text-xl font-bold" itemprop="name text-blue-900">Le Dressing de Pont</h4>
                        <p class="text-sm text-gray-500 italic" itemprop="address">Rue Gambetta</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <a href="tel:00000000" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-bold hover:bg-blue-600 hover:text-white transition">Appeler</a>
                    <a href="#" class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg font-bold hover:bg-gray-200 transition">Voir Site</a>
                </div>
            </article>

            <!-- Exemple 2 -->
            <article class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4 hover:border-blue-400 transition-all" itemscope itemtype="https://schema.org/LocalBusiness">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-orange-100 rounded-full flex items-center justify-center text-orange-600">
                        <i class="fa-solid fa-utensils text-xl"></i>
                    </div>
                    <div>
                        <h4 class="text-xl font-bold" itemprop="name text-blue-900">Restaurant Le Commerce</h4>
                        <p class="text-sm text-gray-500 italic" itemprop="address">Place de la République</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <a href="tel:00000000" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-bold hover:bg-blue-600 hover:text-white transition">Appeler</a>
                    <a href="#" class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg font-bold hover:bg-gray-200 transition">Voir Site</a>
                </div>
            </article>

        </div>
    </main>

</body>
</html>
